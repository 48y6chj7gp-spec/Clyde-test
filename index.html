<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>照妖镜 — 星座 × MBTI 现出原形</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --card: #141414;
  --border: rgba(255,255,255,0.06);
  --text: #d4cfc8;
  --text-dim: #6b6660;
  --text-sub: #8b857d;
  --accent: #bfa67a;
  --accent-dim: rgba(191,166,122,0.15);
  --accent-glow: rgba(191,166,122,0.3);
}

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex; justify-content: center;
  padding: 0 16px 40px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.container { width: 100%; max-width: 420px; }

/* Screen management */
.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.4s ease; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes softPop { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
@keyframes subtleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes ringPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(191,166,122,0.2); } 50% { box-shadow: 0 0 0 12px rgba(191,166,122,0); } }

/* Brand */
.brand { text-align: center; padding: 40px 0 24px; }
.brand .logo { font-size: 22px; font-weight: 300; letter-spacing: 6px; color: var(--text); }
.brand .sub { font-size: 10px; color: var(--text-dim); letter-spacing: 4px; margin-top: 6px; text-transform: uppercase; }

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  margin-bottom: 16px;
}

/* Section header */
.sec-title {
  font-size: 13px; font-weight: 500; color: var(--text-dim); letter-spacing: 2px;
  margin-bottom: 16px; text-align: center; text-transform: uppercase;
}

/* ===== ZODIAC GRID ===== */
.zodiac-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.zodiac-item {
  aspect-ratio: 1; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.02);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.25s; gap: 2px;
}
.zodiac-item:active { transform: scale(0.96); }
.zodiac-item.selected {
  border-color: var(--accent);
  background: var(--accent-dim);
  box-shadow: 0 0 0 1px var(--accent-glow);
}
.zodiac-item .emoji { font-size: 26px; transition: transform 0.3s; }
.zodiac-item.selected .emoji { transform: scale(1.15); }
.zodiac-item .label { font-size: 11px; color: var(--text-dim); }
.zodiac-item.selected .label { color: var(--accent); }

/* Buttons */
.btn {
  width: 100%; padding: 15px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  letter-spacing: 2px; font-family: inherit;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.25; cursor: not-allowed; }
.btn:disabled:active { transform: none; }

.btn-primary {
  background: rgba(255,255,255,0.9); color: #0d0d0d;
  margin-top: 12px;
}
.btn-primary:not(:disabled):hover { background: #fff; }

.btn-ghost {
  background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.08);
  font-size: 13px; padding: 12px; letter-spacing: 1px;
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

/* ===== QUIZ ===== */
.quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.progress-dots { display: flex; gap: 4px; }
.progress-dot {
  width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.1);
  transition: all 0.3s;
}
.progress-dot.done { background: var(--accent); }
.progress-dot.current { background: rgba(255,255,255,0.5); transform: scale(1.3); }

.quiz-dim { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

.q-text { font-size: 18px; font-weight: 400; line-height: 1.6; margin-bottom: 28px; color: var(--text); }

.option {
  display: block; width: 100%; padding: 14px 16px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02);
  color: var(--text-sub); font-size: 13px; text-align: left; cursor: pointer;
  transition: all 0.2s; margin-bottom: 8px; font-family: inherit; line-height: 1.5;
}
.option:active { transform: scale(0.98); }
.option .opt-prefix { color: var(--accent); margin-right: 8px; font-size: 11px; letter-spacing: 1px; }
.option.selected-anim { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }

/* ===== LOADING ===== */
.loading-wrap { text-align: center; padding: 50px 20px; }
.loading-ring {
  width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 24px;
  border: 2px solid rgba(255,255,255,0.06);
  border-top-color: var(--accent);
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-dim); letter-spacing: 2px; }
.loading-joke { font-size: 12px; color: var(--text-dim); margin-top: 10px; opacity: 0.5; }

/* ===== RESULT ===== */
.result-card { padding: 36px 24px; animation: softPop 0.5s ease; }

/* Animal emblem */
.emblem-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
.emblem {
  width: 120px; height: 120px; border-radius: 50%;
  background: radial-gradient(circle, rgba(191,166,122,0.1) 0%, transparent 70%);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(191,166,122,0.2);
  position: relative;
  animation: ringPulse 3s ease infinite;
}
.emblem .emoji { font-size: 56px; animation: subtleFloat 3s ease infinite; }

.result-name { font-size: 26px; font-weight: 300; letter-spacing: 6px; text-align: center; margin-bottom: 2px; }
.result-meta { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; text-align: center; margin-bottom: 32px; }

/* Analysis sections */
.analysis-section { margin-bottom: 28px; }
.analysis-section:last-child { margin-bottom: 0; }
.sec-label {
  font-size: 10px; font-weight: 500; color: var(--accent); letter-spacing: 3px;
  margin-bottom: 10px; text-transform: uppercase;
}
.sec-body { font-size: 14px; line-height: 1.85; color: var(--text-sub); }
.sec-body p { margin-bottom: 10px; }
.sec-body p:last-child { margin-bottom: 0; }

/* Divider */
.divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 28px 0; }

/* CP box */
.cp-inline { font-size: 14px; color: var(--text-sub); line-height: 1.7; }
.cp-inline .cp-icon { font-size: 24px; vertical-align: middle; margin-right: 4px; }

/* Tag row */
.tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; justify-content: center; }
.tag {
  padding: 5px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 2px;
  border: 1px solid rgba(255,255,255,0.06); color: var(--text-dim);
}

/* Action buttons */
.result-actions { display: flex; gap: 10px; margin-top: 20px; }
.result-actions .btn { flex: 1; }

/* Toast */
.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; color: var(--text); padding: 12px 24px;
  border-radius: 100px; font-size: 13px; z-index: 100;
  border: 1px solid rgba(255,255,255,0.08);
  animation: fadeUp 0.35s ease;
  pointer-events: none; letter-spacing: 1px;
}

/* Mobile */
@media (max-width: 360px) {
  .zodiac-grid { gap: 6px; }
  .zodiac-item { border-radius: 10px; }
  .zodiac-item .emoji { font-size: 22px; }
  .zodiac-item .label { font-size: 10px; }
  .q-text { font-size: 16px; }
  .option { font-size: 12px; padding: 12px 14px; margin-bottom: 6px; }
  .emblem { width: 100px; height: 100px; }
  .emblem .emoji { font-size: 44px; }
  .result-name { font-size: 22px; }
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- ====== ZODIAC SELECT ====== -->
  <div class="screen active" id="screen-zodiac">
    <div class="brand">
      <div class="logo">照 妖 镜</div>

      <button class="btn btn-primary" id="btnRetry">重新测试</button>
    </div>
  </div>

</div>

        mbti: 'SP 型——感觉的敏锐与感知的自由——让你成为不按常理出牌的天才。你对美有着天生的敏感：一张好照片、一首好音乐、一条剪裁完美的裙子——这些能让你快乐一整天。你不追求世俗意义上的"成功"，你追求的是"我觉得值"。SP 型让你成为了反卷先锋：别人在加班你在撸猫，别人在考证你在天台看日落。不是懒，是你对"值得"的定义和别人不一样。但 SP 型也让你难以被规训——任何形式的约束都会触发你的逃离本能。你不是叛逆，你只是太爱自由了。',
        fusion: '水象的神秘与 SP 的自由魂融合，照妖镜里显出最高不可攀的凌霜猫。你是一只独自行走在都市夜色中的猫——步伐优雅、眼神冷淡，不主动讨好任何人。你有自己的节奏、自己的审美、自己的小世界，别人进不来，你也不太想出去。凌霜猫的致命魅力在于：你的忽冷忽热不是策略，是天性。想理一个人的时候，你比任何人都甜、都黏、都细腻；不想理的时候，你消失得比风还快。这种不确定性让人抓狂，但也让人上瘾。你不缺喜欢——你缺的是那个能让你持续保持"想理他"的人。你不怕孤独，你怕的是和错的人在一起反而比一个人更孤独。',
        personal: '亲爱的凌霜猫，你的高冷是你最性感的铠甲。但真正爱你的人不需要你卸下铠甲——他会在铠甲旁边坐下来等你伸出爪尖的那一刻。'
      },
      cp: { emoji:'🐆', name:'逐 风 豹', reason:'一个懒一个野。你们在一起不需要刻意维系——舒服是唯一的标准。' },
      tags: ['高冷艺术家','反卷先锋','忽冷忽热','审美天花板'],
    },
  },
};

const loadingJokes = [
  '正在解读你的星座DNA序列...', '正在扫描你的人格维度...', '正在翻阅天界妖怪图鉴...',
  '正在分析你的社交模式...', '正在和十二星座连线...', '正在翻阅你的朋友圈...',
  '数据量有点大，请耐心等待...', '妖怪正在显形的路上...', '检测到大量已读不回记录...',
  '脑内小剧场正在加载字幕...',
];

// ==================== STATE ====================
let state = {
  zodiac: null, currentQ: 0,
  scores: { E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0 },
  result: null, answering: false,
};

// ==================== DOM ====================
const $ = id => document.getElementById(id);
const screenZodiac = $('screen-zodiac'), screenQuiz = $('screen-quiz');
const screenLoading = $('screen-loading'), screenResult = $('screen-result');
const zodiacGrid = $('zodiacGrid'), btnStart = $('btnStart');
const zodiacLabel = $('zodiacLabel'), progressDots = $('progressDots');
const dimensionLabel = $('dimensionLabel'), questionText = $('questionText');
const optionsWrap = $('optionsWrap'), quizCard = $('quizCard');
const loadingJokeEl = $('loadingJoke'), resultCard = $('resultCard');
const btnShare = $('btnShare'), btnRetry = $('btnRetry');

function showScreen(screen) {
  [screenZodiac, screenQuiz, screenLoading, screenResult].forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
  window.scrollTo({ top:0, behavior:'smooth' });
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 1800);
  setTimeout(() => t.remove(), 2200);
}

// ==================== ZODIAC ====================
function buildZodiacGrid() {
  zodiacGrid.innerHTML = zodiacs.map((z,i) => `
    <div class="zodiac-item" data-index="${i}">
      <span class="emoji">${z.emoji}</span>
      <span class="label">${z.name}</span>
    </div>
  `).join('');

  zodiacGrid.addEventListener('click', e => {
    const item = e.target.closest('.zodiac-item');
    if (!item) return;
    document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('selected'));
    item.classList.add('selected');
    state.zodiac = zodiacs[parseInt(item.dataset.index)];
    btnStart.disabled = false;
  });
}

btnStart.addEventListener('click', () => {
  if (!state.zodiac) return;
  state.currentQ = 0;
  state.scores = { E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0 };
  state.result = null; state.answering = false;
  zodiacLabel.textContent = state.zodiac.emoji + ' ' + state.zodiac.name;
  renderQuestion();
  showScreen(screenQuiz);
});

// ==================== QUIZ ====================
function renderQuestion() {
  state.answering = false;
  const q = questions[state.currentQ];

  // Progress dots
  progressDots.innerHTML = questions.map((_,i) => {
    let cls = '';
    if (i < state.currentQ) cls = 'done';
    else if (i === state.currentQ) cls = 'current';
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');

  dimensionLabel.textContent = q.tag;
  questionText.textContent = q.text;

  optionsWrap.innerHTML = q.opts.map((opt,i) => `
    <button class="option" data-dim="${opt.dim}" data-weight="${opt.weight}">
      <span class="opt-prefix">${'ABCD'[i]}</span>${opt.text}
    </button>
  `).join('');

  quizCard.style.animation = 'none';
  quizCard.offsetHeight;
  quizCard.style.animation = 'fadeUp 0.35s ease';
}

optionsWrap.addEventListener('click', e => {
  if (state.answering) return;
  const opt = e.target.closest('.option');
  if (!opt) return;
  state.answering = true;
  opt.classList.add('selected-anim');

  const dim = opt.dataset.dim;
  const weight = parseInt(opt.dataset.weight);
  state.scores[dim] += weight;

  setTimeout(() => {
    state.currentQ++;
    if (state.currentQ >= questions.length) { finishQuiz(); }
    else { renderQuestion(); }
  }, 300);
});

// ==================== FINISH ====================
function finishQuiz() {
  showScreen(screenLoading);
  let jokeIdx = 0;
  loadingJokeEl.textContent = loadingJokes[0];
  const t = setInterval(() => {
    jokeIdx = (jokeIdx + 1) % loadingJokes.length;
    loadingJokeEl.textContent = loadingJokes[jokeIdx];
  }, 800);

  setTimeout(() => {
    clearInterval(t);
    const mbti = calculateMBTI();
    const group = getMBTIGroup(mbti);
    state.result = animalData[state.zodiac.element][group];
    state.result.mbti = mbti;
    renderResult();
    showScreen(screenResult);
  }, 2200);
}

function calculateMBTI() {
  const s = state.scores;
  return (s.E>=s.I?'E':'I') + (s.S>=s.N?'S':'N') + (s.T>=s.F?'T':'F') + (s.J>=s.P?'J':'P');
}

function getMBTIGroup(t) {
  if (t[1]==='N'&&t[2]==='T') return 'NT';
  if (t[1]==='N'&&t[2]==='F') return 'NF';
  if (t[1]==='S'&&t[3]==='J') return 'SJ';
  return 'SP';
}

// ==================== RESULT ====================
function renderResult() {
  const r = state.result;
  const el = { fire:'火象', earth:'土象', air:'风象', water:'水象' };
  const a = r.analysis;

  resultCard.innerHTML = `
    <div class="emblem-wrap">
      <div class="emblem"><span class="emoji">${r.emoji}</span></div>
    </div>
    <div class="result-name">${r.name}</div>
    <div class="result-meta">${state.zodiac.emoji} ${state.zodiac.name} · ${el[state.zodiac.element]} · ${r.mbti} · ${r.code}</div>

    <div class="analysis-section">
      <div class="sec-label">星座底色 · ${el[state.zodiac.element]}</div>
      <div class="sec-body"><p>${a.zodiac}</p></div>
    </div>

    <hr class="divider">

    <div class="analysis-section">
      <div class="sec-label">人格棱镜 · ${r.mbti}</div>
      <div class="sec-body"><p>${a.mbti}</p></div>
    </div>

    <hr class="divider">

    <div class="analysis-section">
      <div class="sec-label">现出原形 · ${r.emoji} ${r.name}</div>
      <div class="sec-body"><p>${a.fusion}</p></div>
    </div>

    <hr class="divider">

    <div class="analysis-section">
      <div class="sec-label">致 ${r.name} 的你</div>
      <div class="sec-body"><p>${a.personal}</p></div>
    </div>

    <hr class="divider">

    <div class="analysis-section">
      <div class="sec-label">本命伴侣</div>
      <div class="cp-inline">${r.cp.emoji} <strong>${r.cp.name}</strong><br>${r.cp.reason}</div>
    </div>

    <div class="tag-row">
      ${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
  `;
}

// ==================== SHARE & RETRY ====================
btnShare.addEventListener('click', () => {
  if (!state.result) return;
  const r = state.result;
  const text = `【照妖镜】${state.zodiac.emoji} ${state.zodiac.name} · 原形：${r.emoji} ${r.name}\n\n来照照你是什么妖怪 →`;

  if (navigator.share) {
    navigator.share({ title:'照妖镜 — 星座×MBTI 现出原形', text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(() => toast('已复制，去分享吧')).catch(() => toast('请截图分享'));
  }
});

btnRetry.addEventListener('click', () => {
  state.zodiac = null; state.currentQ = 0;
  state.scores = { E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0 };
  state.result = null; state.answering = false;
  btnStart.disabled = true;
  document.querySelectorAll('.zodiac-item').forEach(el => el.classList.remove('selected'));
  showScreen(screenZodiac);
});

// ==================== INIT ====================
buildZodiacGrid();
</script>
</body>
</html>
